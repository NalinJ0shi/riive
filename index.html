<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Animation Engine - Step 1 & 2</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js"></script>
</head>
<body>
    <div id="editor-ui">
        <div id="toolbar">
    <label class="btn-primary">
        Import Image
        <input type="file" id="image-upload" accept="image/*" hidden>
    </label>
    
    <button id="export-btn" class="btn-primary" style="background: #28a745;">Export JSON</button>
    
    <div class="properties-panel" style="display: inline-flex; gap: 15px; margin-left: 20px; align-items: center; background: #2a2a2a; padding: 5px 15px; border-radius: 5px;">

        <label style="color: white; font-size: 14px;">
            Alpha: <span id="alpha-val">1.0</span>
            <input type="range" id="alpha-slider" min="0" max="1" step="0.1" value="1" style="vertical-align: middle;">
        </label>

        <label style="color: white; font-size: 14px;">
            Rot: <span id="rot-val">0°</span>
            <input type="range" id="rot-slider" min="-180" max="180" value="0" style="vertical-align: middle;">
        </label>

    </div>
    <div id="zoom-display">Zoom: 100%</div>
    <div id="controls-hint">Scroll: Zoom | Right-Click: Pan | Left-Click: Move</div>
        </div>
    </div>
    <div id="layers-panel">
        <h3>Layers</h3>
        <ul id="layers-list">
            </ul>
    </div>
    <div id="canvas-container"></div>
    
    <div id="timeline-panel">
        <div id="timeline-controls">
            <button id="play-btn">Play</button>
            <span id="current-frame">Frame: 0</span>
            <button id="add-keyframe-btn" class="btn-secondary">◆ Add Keyframe</button>
            
            <button id="bind-btn" class="btn-secondary">🔗 Bind to Parent</button>
        </div>
        <div id="timeline-track-container">
            <div id="playhead"></div>
            <div id="keyframes-track"></div>
        </div>
    </div>
    
    <script src="editor.js"></script>
</body>
</html>
