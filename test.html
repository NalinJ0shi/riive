<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Custom Animation Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #fff0f3; }
        canvas { display: block; }
    </style>
</head>
<body>

    <script>
        // 1. Initialize Full-Screen Player Canvas
        const app = new PIXI.Application({ 
            width: window.innerWidth, 
            height: window.innerHeight, 
            backgroundColor: 0xffffff,
            resizeTo: window 
        });
        document.body.appendChild(app.view);

        const world = new PIXI.Container();
        app.stage.addChild(world);

        // --- MOUSE TRACKING SETUP ---
        let targetMouseX = window.innerWidth / 2;
        let targetMouseY = window.innerHeight / 2;

        app.stage.eventMode = 'static';
        app.stage.hitArea = new PIXI.Rectangle(0, 0, window.innerWidth, window.innerHeight);
        app.stage.on('pointermove', (e) => {
            targetMouseX = e.global.x;
            targetMouseY = e.global.y;
        });

        // 2. Fetch YOUR custom JSON file
        fetch('idle anim.json')
            .then(response => response.json())
            .then(animationData => {
                
                const sprites = {};

                // 3. Rebuild ALL images
                for (const spriteID in animationData.assets) {
                    const base64String = animationData.assets[spriteID];
                    const texture = PIXI.Texture.from(base64String);
                    const sprite = new PIXI.Sprite(texture);
                    sprite.anchor.set(0.5); 
                    
                    // Save Base position for timeline vs live-tracking separation
                    sprite.baseX = 0;
                    sprite.baseY = 0;

                    if (animationData.setup && animationData.setup[spriteID]) {
                        sprite.baseX = animationData.setup[spriteID].x;
                        sprite.baseY = animationData.setup[spriteID].y;
                    }
                    
                    sprites[spriteID] = sprite;
                    world.addChild(sprite);
                }

                // 4. Rebuild the "Skeleton" (Parenting)
                if (animationData.hierarchy) {
                    for (const [childID, parentID] of Object.entries(animationData.hierarchy)) {
                        if (sprites[childID] && sprites[parentID]) {
                            sprites[parentID].addChild(sprites[childID]);
                        }
                    }
                }

                // --- ZERO-CONFIG TRICK: Calculate Skeleton Depth ---
                // Shirt=0, Arm=1, Face=2, Eyes/Glasses=3, Pupils=4
                for (const id in sprites) {
                    let depth = 0;
                    let current = sprites[id];
                    while (current.parent && current.parent !== world) {
                        depth++;
                        current = current.parent;
                    }
                    sprites[id].depthLevel = depth;
                }

                // 5. The Hybrid Playback Engine
                let currentFrame = 0;
                
                app.ticker.add(() => {
                    
                    // --- STEP A: TIMELINE ANIMATION ---
                    currentFrame++;
                    if (currentFrame >= animationData.duration) currentFrame = 0;

                    if (animationData.sprites) {
                        for (const [id, keyframes] of Object.entries(animationData.sprites)) {
                            const sprite = sprites[id];
                            if (!sprite) continue;

                            const frameKeys = Object.keys(keyframes).map(Number).sort((a, b) => a - b);
                            let prev = frameKeys.filter(f => f <= currentFrame).pop();
                            let next = frameKeys.filter(f => f > currentFrame)[0];

                            if (prev !== undefined && next !== undefined) {
                                const progress = (currentFrame - prev) / (next - prev);
                                sprite.baseX = keyframes[prev].x + (keyframes[next].x - keyframes[prev].x) * progress;
                                sprite.baseY = keyframes[prev].y + (keyframes[next].y - keyframes[prev].y) * progress;
                            } else if (prev !== undefined) {
                                sprite.baseX = keyframes[prev].x; 
                                sprite.baseY = keyframes[prev].y;
                            }
                        }
                    }

                    // --- STEP B: APPLY LIVE MOUSE TRACKING (Radial Clamp) ---
                    for (const id in sprites) {
                        const sprite = sprites[id];
                        
                        // Set everyone to their timeline base position first
                        sprite.x = sprite.baseX;
                        sprite.y = sprite.baseY;

                        // Magic Rule: ONLY track mouse if Depth Level is 4 or deeper (The Pupils!)
                        if (sprite.depthLevel >= 4) {
                            
                            const localMouse = sprite.parent.toLocal(new PIXI.Point(targetMouseX, targetMouseY));
                            
                            let dx = localMouse.x - sprite.baseX;
                            let dy = localMouse.y - sprite.baseY;

                            // 15% smooth follow
                            let targetX = dx * 0.15;
                            let targetY = dy * 0.15;

                            // RADIAL CLAMP MATH
                            let maxRadius = 15; // Set this to the maximum pixels the pupil can move!
                            
                            // Pythagorean theorem to find actual distance
                            let distance = Math.sqrt((targetX * targetX) + (targetY * targetY));

                            let offsetX = targetX;
                            let offsetY = targetY;

                            // Snap to the circular edge if it tries to leave the eyeball
                            if (distance > maxRadius) {
                                let ratio = maxRadius / distance;
                                offsetX = targetX * ratio;
                                offsetY = targetY * ratio;
                            }

                            // Apply final pupil position!
                            sprite.x = sprite.baseX + offsetX;
                            sprite.y = sprite.baseY + offsetY;
                        }
                    }
                });
            })
            .catch(err => console.error("Error loading JSON:", err));
    </script>
</body>
</html>
