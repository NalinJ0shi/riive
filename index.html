<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Animation Engine - Step 1 & 2</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js"></script>
</head>
<body>
    <div id="editor-ui">
        <div id="toolbar">
            <label class="btn-primary">
                Import Image
                <input type="file" id="image-upload" accept="image/*" hidden>
            </label>
            
            <button id="undo-btn" class="btn-secondary">Undo (Ctrl+Z)</button>
            <button id="export-btn" class="btn-primary" style="background: #28a745;">Export JSON</button>

            <div id="zoom-display">Zoom: 100%</div>
            <div id="controls-hint">Scroll: Zoom | Right-Click: Pan | Left-Click: Move</div>
        </div>
    </div>
    <div id="layers-panel">
        <h3>Layers</h3>
        <ul id="layers-list">
            </ul>
    </div>
    <div id="canvas-container"></div>
    
    <div id="timeline-panel">
        <div id="timeline-controls">
            <button id="play-btn">Play</button>
            <span id="current-frame">Frame: 0</span>
            <button id="add-keyframe-btn" class="btn-secondary">◆ Add Keyframe</button>
            
            <button id="bind-btn" class="btn-secondary">🔗 Bind to Parent</button>
        </div>
        <div id="timeline-track-container">
            <div id="playhead"></div>
            <div id="keyframes-track"></div>
        </div>
    </div>
    
    <script src="editor.js"></script>
</body>
</html>
