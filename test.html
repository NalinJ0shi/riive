<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Player Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js"></script>
    <style>
        /* Removes default browser margins so the canvas is truly full screen */
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        canvas { display: block; }
    </style>
</head>
<body>

<script>
    // 1. Initialize Full-Screen Player Canvas
    const app = new PIXI.Application({ 
        width: window.innerWidth, 
        height: window.innerHeight, 
        backgroundColor: 0xffffff,
        resizeTo: window 
    });
    document.body.appendChild(app.view);

    const world = new PIXI.Container();
    
    // --- SCALE & POSITION CONTROLS ---
    const scaleFactor = 0.5; // Change this to scale the character (e.g., 0.3 for 30%)
    world.scale.set(scaleFactor);
    
    // This math keeps the character perfectly centered after shrinking
    world.x = (window.innerWidth / 2) * (1 - scaleFactor);
    world.y = (window.innerHeight / 2) * (1 - scaleFactor);
    app.stage.addChild(world);

    // --- MOUSE TRACKING SETUP ---
    let targetMouseX = window.innerWidth / 2;
    let targetMouseY = window.innerHeight / 2;

    app.stage.eventMode = 'static';
    app.stage.hitArea = new PIXI.Rectangle(0, 0, window.innerWidth, window.innerHeight);
    app.stage.on('pointermove', (e) => {
        targetMouseX = e.global.x;
        targetMouseY = e.global.y;
    });

    // 2. Fetch YOUR custom JSON file (ensure the name matches your export)
    fetch('idle5.json')
        .then(response => response.json())
        .then(animationData => {
            
            const sprites = {};

            // 3. Rebuild ALL images
            for (const spriteID in animationData.assets) {
                const base64String = animationData.assets[spriteID];
                const texture = PIXI.Texture.from(base64String);
                const sprite = new PIXI.Sprite(texture);
                sprite.anchor.set(0.5); 
                
                // Save Base position for timeline rendering
                sprite.baseX = 0;
                sprite.baseY = 0;

                sprite.baseX = 0;
                sprite.baseY = 0;

                // THE FIX: Check for the pupil tag directly! No "setup" check needed.
                if (animationData.sprites[spriteID] && animationData.sprites[spriteID].type === "pupil") {
                    sprite.isPupil = true; 
                }
                
                sprites[spriteID] = sprite;
                world.addChild(sprite);
            }

            // 4. Rebuild the "Skeleton" (Parenting Hierarchy)
            if (animationData.hierarchy) {
                for (const [childID, parentID] of Object.entries(animationData.hierarchy)) {
                    if (sprites[childID] && sprites[parentID]) {
                        sprites[parentID].addChild(sprites[childID]);
                    }
                }
            }

            // Calculate depth for pupil tracking
            for (const id in sprites) {
                let depth = 0;
                let current = sprites[id];
                while (current.parent && current.parent !== world) {
                    depth++;
                    current = current.parent;
                }
                sprites[id].depthLevel = depth;
            }

            // 5. The Segmented Playback Engine
            const segments = {
                idle: { start: 0, end: 60, loop: true },
                angry: { start: 100, end: 130, loop: false } // Will hold on frame 130
            };
            
            let activeSegment = segments.idle;
            let currentFrame = activeSegment.start;

            // --- STATE MACHINE LOGIC ---
            // Make the entire 'world' container the interactive trigger
            world.eventMode = 'static';
            world.cursor = 'pointer';

            // Trigger Angry State on Hover
            world.on('pointerenter', () => {
                activeSegment = segments.angry;
                currentFrame = activeSegment.start;
            });

            // Revert to Idle State when mouse leaves
            world.on('pointerleave', () => {
                activeSegment = segments.idle;
                currentFrame = activeSegment.start;
            });

            // 6. The Animation Loop (Ticker)
            app.ticker.add(() => {
                
                // --- STEP A: TIMELINE SEGMENTATION & LOOPING ---
                // If we haven't reached the end, keep playing
                if (currentFrame < activeSegment.end) {
                    currentFrame++;
                } 
                // If we hit the end AND it's supposed to loop, go back to start
                else if (activeSegment.loop) {
                    currentFrame = activeSegment.start;
                } 
                // If we hit the end and loop is FALSE, just hold on the last frame
                else {
                    currentFrame = activeSegment.end; 
                }

                // --- STEP B: INTERPOLATE KEYFRAMES ---
                if (animationData.sprites) {
                    for (const [id, keyframes] of Object.entries(animationData.sprites)) {
                        const sprite = sprites[id];
                        if (!sprite) continue;

                        const frameKeys = Object.keys(keyframes).map(Number).sort((a, b) => a - b);
                        let prev = frameKeys.filter(f => f <= currentFrame).pop();
                        let next = frameKeys.filter(f => f > currentFrame)[0];

                        // Update baseX and baseY
                        if (prev !== undefined && next !== undefined) {
                            const progress = (currentFrame - prev) / (next - prev);
                            sprite.baseX = keyframes[prev].x + (keyframes[next].x - keyframes[prev].x) * progress;
                            sprite.baseY = keyframes[prev].y + (keyframes[next].y - keyframes[prev].y) * progress;
                            
                            const prevRot = keyframes[prev].rotation || 0;
                            const nextRot = keyframes[next].rotation || 0;
                            sprite.rotation = prevRot + (nextRot - prevRot) * progress;

                            const prevAlpha = keyframes[prev].alpha !== undefined ? keyframes[prev].alpha : 1;
                            const nextAlpha = keyframes[next].alpha !== undefined ? keyframes[next].alpha : 1;
                            sprite.alpha = prevAlpha + (nextAlpha - prevAlpha) * progress;

                        } else if (prev !== undefined) {
                            sprite.baseX = keyframes[prev].x; 
                            sprite.baseY = keyframes[prev].y;
                            sprite.rotation = keyframes[prev].rotation || 0;
                            sprite.alpha = keyframes[prev].alpha !== undefined ? keyframes[prev].alpha : 1;
                        }
                    }
                }

                // --- STEP C: APPLY LIVE MOUSE TRACKING ---
                for (const id in sprites) {
                const sprite = sprites[id];
                
                // Default to timeline position
                sprite.x = sprite.baseX;
                sprite.y = sprite.baseY;

                // INSTEAD OF GUESSING THE INDEX, LOOK FOR THE TAG!
                if (sprite.isPupil) {
    
                    // --- 1. DEBUG VISUALIZER: DRAW THE INVISIBLE CAGE ---
                    if (!sprite.debugOutline) {
                        sprite.debugOutline = new PIXI.Graphics();
                        sprite.parent.addChild(sprite.debugOutline);
                    }

                    // TUNE THESE NUMBERS! Watch the red oval on your screen change size.
                   // TUNE THESE: The size of the cage
                    let rx = 25; 
                    let ry = 12; 

                    // NEW! TUNE THESE: Slide the invisible cage to fix the tug-of-war
                    // A negative number slides the cage left, positive slides right.
                    let cageOffsetX = 8; 
                    let cageOffsetY = -5;   

                    // --- 1. DEBUG VISUALIZER ---
                    if (!sprite.debugOutline) {
                        sprite.debugOutline = new PIXI.Graphics();
                        sprite.parent.addChild(sprite.debugOutline);
                    }
                    sprite.debugOutline.clear();
                    // debug oval removed

                    // 2. PARENT SPACE TRACKING
                    const localMouse = sprite.parent.toLocal(new PIXI.Point(targetMouseX, targetMouseY));
                    let dx = localMouse.x - sprite.baseX;
                    let dy = localMouse.y - sprite.baseY;

                    let targetX = dx * 0.15;
                    let targetY = dy * 0.15;

                    // 3. ASYMMETRICAL CLAMPING MATH (The Magic Fix)
                    // We temporarily shift the math into the cage's new offset space
                    let shiftedX = targetX - cageOffsetX;
                    let shiftedY = targetY - cageOffsetY;

                    let ellipseCalc = (shiftedX * shiftedX) / (rx * rx) + (shiftedY * shiftedY) / (ry * ry);

                    // If it hits the boundary, clamp it
                    if (ellipseCalc > 1) {
                        let scale = 1 / Math.sqrt(ellipseCalc);
                        shiftedX = shiftedX * scale;
                        shiftedY = shiftedY * scale;
                    }

                    // Shift the math back to reality
                    let offsetX = shiftedX + cageOffsetX;
                    let offsetY = shiftedY + cageOffsetY;

                    // Add to the final sprite position
                    sprite.x = sprite.baseX + offsetX;
                    sprite.y = sprite.baseY + offsetY;
                }
            }
            });
        })
        .catch(err => console.error("Error loading JSON:", err));
</script>
</body>
</html>
